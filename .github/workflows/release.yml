name: Release

on:
  workflow_dispatch:

jobs:
  # Gate: never publish a wheel without first proving lint + tests pass on
  # the exact tree we're about to ship. Without this, a red `main` could
  # still ship to PyPI because release is `workflow_dispatch`-only and
  # bypasses CI's `push: main` trigger.
  gate:
    name: Pre-release gate (lint + tests)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Install ffmpeg
        # Matches the test job in ci.yml — `cmd_analyze` preflights ffmpeg
        # for Telegram refs with voice/video enrichment (the default), so
        # the release gate needs a real ffmpeg on PATH to mirror the
        # documented user install shape.
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync dev dependencies
        run: uv sync --extra dev

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format --check
        run: uv run ruff format --check .

      - name: pytest
        run: uv run pytest -q

  release:
    needs: gate
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install semantic-release
        run: |
          npm install -g semantic-release
          npm install -g @semantic-release/commit-analyzer
          npm install -g @semantic-release/release-notes-generator
          npm install -g @semantic-release/changelog
          npm install -g @semantic-release/exec
          npm install -g @semantic-release/git
          npm install -g @semantic-release/github
          npm install -g conventional-changelog-conventionalcommits

      - name: Release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The exec plugin's prepareCmd runs `python scripts/sync_version.py`
          # to bump pyproject.toml + unread/__init__.py; the git plugin
          # then commits those alongside CHANGELOG.md and pushes back to
          # main. Capture the version semantic-release computed for the
          # publish + verify steps below.
          npx semantic-release
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$VERSION" ]; then
            echo "new_release_published=true" >> "$GITHUB_OUTPUT"
            echo "new_release_version=${VERSION#v}" >> "$GITHUB_OUTPUT"
          else
            echo "new_release_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup uv (PyPI publish)
        if: steps.semantic.outputs.new_release_published == 'true'
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Build wheel + sdist
        if: steps.semantic.outputs.new_release_published == 'true'
        run: uv build

      - name: Verify wheel includes data files + correct version
        if: steps.semantic.outputs.new_release_published == 'true'
        env:
          NEW_VERSION: ${{ steps.semantic.outputs.new_release_version }}
        run: |
          # Belt-and-braces guard: assert the wheel contains the ship-
          # critical data files (schema.sql + every preset) and that its
          # filename carries the version semantic-release just computed.
          # A mismatch here means the version-sync or hatch include rules
          # silently broke — fail loudly before publishing to PyPI.
          set -euo pipefail
          unzip -l dist/*.whl | grep -E "unread/db/schema\.sql$" \
            || { echo "wheel missing schema.sql"; exit 1; }
          unzip -l dist/*.whl | grep -E "presets/en/summary\.md$" \
            || { echo "wheel missing presets/en/summary.md"; exit 1; }
          python - <<'PY'
          import glob, os, sys
          version = os.environ["NEW_VERSION"]
          wheels = glob.glob("dist/*.whl")
          assert wheels, "no wheel built"
          ok = any(version in w for w in wheels)
          if not ok:
              sys.exit(f"wheel filename {wheels} does not contain {version!r}")
          PY

      - name: Publish to PyPI
        if: steps.semantic.outputs.new_release_published == 'true'
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: uv publish
