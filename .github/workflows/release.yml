name: Release

on:
  workflow_dispatch:

jobs:
  # Gate: never publish a wheel without first proving lint + tests pass on
  # the exact tree we're about to ship. Without this, a red `main` could
  # still ship to PyPI because release is `workflow_dispatch`-only and
  # bypasses CI's `push: main` trigger.
  gate:
    name: Pre-release gate (lint + tests)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync dev dependencies
        run: uv sync --extra dev

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format --check
        run: uv run ruff format --check .

      - name: pytest
        run: uv run pytest -q

  release:
    needs: gate
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install semantic-release
        run: |
          npm install -g semantic-release
          npm install -g @semantic-release/commit-analyzer
          npm install -g @semantic-release/release-notes-generator
          npm install -g @semantic-release/github
          npm install -g conventional-changelog-conventionalcommits

      - name: Release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx semantic-release
          # Extract version from latest git tag
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$VERSION" ]; then
            echo "new_release_published=true" >> "$GITHUB_OUTPUT"
            echo "new_release_version=${VERSION#v}" >> "$GITHUB_OUTPUT"
          else
            echo "new_release_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup uv (PyPI publish)
        if: steps.semantic.outputs.new_release_published == 'true'
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync version into package + pyproject
        if: steps.semantic.outputs.new_release_published == 'true'
        env:
          NEW_VERSION: ${{ steps.semantic.outputs.new_release_version }}
        run: |
          # semantic-release tags the commit but doesn't write the new
          # version into pyproject.toml / __init__.py. We do that here so
          # the wheel published below carries the correct number.
          python - <<'PY'
          import os, re, pathlib
          version = os.environ["NEW_VERSION"]
          for path, pattern in [
              ("pyproject.toml", r'^version\s*=\s*"[^"]+"'),
              ("unread/__init__.py", r'^__version__\s*=\s*"[^"]+"'),
          ]:
              p = pathlib.Path(path)
              text = p.read_text()
              new_text = re.sub(
                  pattern,
                  f'version = "{version}"' if path.endswith(".toml") else f'__version__ = "{version}"',
                  text,
                  count=1,
                  flags=re.MULTILINE,
              )
              p.write_text(new_text)
              print(f"updated {path} -> {version}")
          PY

      - name: Build wheel + sdist
        if: steps.semantic.outputs.new_release_published == 'true'
        run: uv build

      - name: Publish to PyPI
        if: steps.semantic.outputs.new_release_published == 'true'
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: uv publish
