<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a0d12"/>
      <stop offset="1" stop-color="#11161e"/>
    </linearGradient>
    <radialGradient id="glow" cx="900" cy="120" r="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7dd3fc" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#7dd3fc" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="100" cy="600" r="450" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7dd3fc" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#7dd3fc" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <g font-family="ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace" fill="#7dd3fc" font-size="32" font-weight="600">
    <text x="80" y="120">$ unread</text>
  </g>

  <g font-family="ui-sans-serif, system-ui, sans-serif" fill="#e3e8ef">
    <text x="80" y="290" font-size="86" font-weight="800" letter-spacing="-2">Your unread</text>
    <text x="80" y="385" font-size="86" font-weight="800" letter-spacing="-2">is now read.</text>
  </g>

  <g font-family="ui-sans-serif, system-ui, sans-serif" fill="#98a2b3">
    <text x="80" y="465" font-size="28" font-weight="400">Local CLI that turns Telegram, YouTube, web pages &amp; files</text>
    <text x="80" y="505" font-size="28" font-weight="400">into Markdown reports with citations — any LLM.</text>
  </g>

  <g font-family="ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace" fill="#667085" font-size="22">
    <text x="80" y="580">github.com/maxbolgarin/unread</text>
  </g>

  <g transform="translate(960, 380)" stroke="#7dd3fc" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.85">
    <polyline points="0,-50 50,0 0,50"/>
    <line x1="80" y1="50" x2="170" y2="50"/>
  </g>
</svg>
